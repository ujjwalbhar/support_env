spec_version: 1
name: support_env
version: "1.0.0"
description: >
  Customer Support Inbox Automation environment where an AI agent learns to
  classify incoming support emails, generate professional responses, and make
  escalation or resolution decisions. Includes 3 difficulty levels (easy,
  medium, hard) with automated graders and partial reward signals.
type: environment
author: "Hackathon Participant"

runtime:
  type: docker

app:
  module: server.app
  object: app

port: 7860

tasks:
  - id: easy
    description: "Classify the customer email into the correct category (complaint/refund/inquiry/technical/billing)"
    difficulty: easy
    reward_range: [0.0, 1.0]

  - id: medium
    description: "Classify the email AND generate a professional customer response"
    difficulty: medium
    reward_range: [0.0, 1.0]

  - id: hard
    description: "Multi-step: classify → respond → escalate or resolve correctly"
    difficulty: hard
    reward_range: [0.0, 1.0]

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [classify, respond, escalate, resolve]
    category:
      type: string
      enum: [complaint, refund, inquiry, technical, billing]
      required: false
    response_text:
      type: string
      required: false
    escalation_reason:
      type: string
      required: false
    resolution_summary:
      type: string
      required: false

observation_space:
  type: object
  properties:
    email_id: string
    email_subject: string
    email_body: string
    customer_name: string
    customer_tier: string
    previous_interactions: integer
    current_category: string
    action_feedback: string
    task_complete: boolean
    reward: float
    task_id: string
